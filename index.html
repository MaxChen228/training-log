<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRAINING_LOG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        bg: '#F8F7F4',
        surface: '#FCFBFA',
        borderBase: '#DBD6CD',
        borderL: '#E8E4DB',
        ink: '#2A2520',
        sub: '#7A756C',
        inkLight: '#5A5550',
        dev: '#C0392B',
        contra: '#4A6B8C',
        dual: '#D35400',
        accent: '#E6B300',
        vb: '#5E8073',
      },
    },
  },
};
</script>
<style>
  html, body {
    background: #F8F7F4;
    color: #2A2520;
    -webkit-font-smoothing: antialiased;
    font-family: 'Noto Sans TC', sans-serif;
  }
  * { box-sizing: border-box; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #DBD6CD; }
  ::-webkit-scrollbar-thumb:hover { background: #7A756C; }

  .mono { font-family: 'JetBrains Mono', monospace; }
  .label-micro { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 400; color: #7A756C; }
  .label-dev { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; }
  .title-card { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; }
  .title-page { font-family: 'Noto Sans TC', sans-serif; font-size: 24px; letter-spacing: 0.04em; font-weight: 500; color: #2A2520; }
  .body-text { font-family: 'Noto Sans TC', sans-serif; font-size: 13px; line-height: 1.8; font-weight: 300; color: #5A5550; }
  .data-cell { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-variant-numeric: tabular-nums; font-weight: 400; }

  .ui-card { background: #FCFBFA; border: 1px solid #DBD6CD; border-radius: 4px; }

  .chip {
    display: inline-flex; align-items: center;
    padding: 4px 12px; border-radius: 12px;
    border: 1px solid #DBD6CD; background: transparent;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s ease;
    color: #2A2520;
  }
  .chip:hover { border-color: #7A756C; }
  .chip.active { border-color: transparent; color: #FCFBFA; }
  .chip.active.core { background: #7A756C; }
  .chip.active.prep { background: transparent; border: 1px solid #2A2520; color: #2A2520; }

  .cal-cell {
    background: #FCFBFA;
    padding: 10px 12px; cursor: pointer;
    transition: background 0.2s ease;
    position: relative;
    min-height: 84px;
    overflow: hidden;
  }
  .cal-cell:hover { background: #F4F2ED; }
  .cal-cell.other-month { background: #F8F7F4; }
  .cal-cell.other-month .day-num { color: #DBD6CD; }
  .cal-cell.selected { outline: 1.5px solid #2A2520; outline-offset: -1.5px; z-index: 2; }
  .cal-cell.today .day-num {
    color: #2A2520;
    position: relative;
  }
  .cal-cell.today .day-num::after {
    content: '';
    position: absolute;
    inset: -3px -5px;
    border: 1px solid #E6B300;
    border-radius: 2px;
  }
  .day-num { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500; display: inline-block; }

  .marker { width: 6px; height: 6px; border-radius: 1px; display: inline-block; flex-shrink: 0; }
  .marker.vb   { background: #5E8073; }

  .chip.active.vb  { background: #5E8073; }

  /* BLOCK CARD */
  .block-card {
    background: #FCFBFA;
    border: 1px solid #DBD6CD;
    border-radius: 4px;
    overflow: hidden;
  }
  .block-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: #FCFBFA;
    border-bottom: 1px solid #E8E4DB;
    flex-wrap: wrap;
  }
  .block-card.collapsed .block-header { border-bottom: none; }
  .block-body { padding: 16px 14px 14px; }

  .block-type-dot {
    width: 8px; height: 8px;
    border-radius: 1px;
    flex-shrink: 0;
  }
  .block-type-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    color: #2A2520;
  }
  .block-summary {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: #7A756C;
    text-transform: uppercase;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .block-time-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .block-time-input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: transparent;
    border: 1px solid transparent;
    color: #2A2520;
    padding: 2px 4px;
    outline: none;
    border-radius: 2px;
    transition: all 0.2s ease;
    width: 62px;
  }
  .block-time-input:hover { background: #F4F2ED; border-color: #DBD6CD; }
  .block-time-input:focus { background: #F8F7F4; border-color: #2A2520; }
  .block-time-dash { color: #7A756C; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .block-duration {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: #7A756C;
    padding: 2px 6px;
    border: 1px solid #E8E4DB;
    border-radius: 2px;
    background: #F8F7F4;
  }

  .block-icon-btn {
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid transparent;
    background: transparent;
    color: #7A756C;
    cursor: pointer;
    border-radius: 2px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    transition: all 0.2s ease;
  }
  .block-icon-btn:hover { color: #2A2520; border-color: #DBD6CD; }
  .block-icon-btn.del:hover { color: #C0392B; border-color: #C0392B; }

  .block-note-input,
  textarea.block-note-input {
    width: 100%;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    line-height: 1.6;
    background: #F8F7F4;
    border: 1px solid #DBD6CD;
    border-radius: 2px;
    padding: 8px 10px;
    outline: none;
    resize: vertical;
    color: #2A2520;
  }
  .block-note-input:focus { border-color: #2A2520; }

  /* VIEW TABS */
  .view-tabs {
    display: flex;
    border: 1px solid #DBD6CD;
    border-radius: 2px;
    overflow: hidden;
  }
  .view-tab {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 6px 16px;
    background: transparent;
    border: none;
    color: #7A756C;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .view-tab + .view-tab { border-left: 1px solid #DBD6CD; }
  .view-tab:hover { color: #2A2520; background: #F4F2ED; }
  .view-tab.active { background: #2A2520; color: #FCFBFA; }

  /* MENU VIEW */
  .menu-scroll { height: 100%; overflow-y: auto; }
  .menu-wrap {
    max-width: 1240px;
    margin: 0 auto;
    padding: 48px 40px 80px;
  }
  .menu-head { margin-bottom: 36px; }
  .menu-subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #7A756C;
    margin-top: 8px;
  }
  .menu-meta {
    display: flex;
    gap: 24px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid #DBD6CD;
  }
  .menu-meta-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .menu-meta-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #7A756C;
  }
  .menu-meta-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #2A2520;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }

  .menu-pattern {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: #DBD6CD;
    border: 1px solid #DBD6CD;
    border-radius: 2px;
    margin-bottom: 40px;
  }
  .menu-day {
    background: #FCFBFA;
    padding: 20px 12px;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }
  .menu-day-wd {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    color: #7A756C;
  }
  .menu-day-split {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: #2A2520;
    font-weight: 500;
  }
  .menu-day-bar {
    width: 32px;
    height: 3px;
    border-radius: 1px;
  }
  .menu-day.rest .menu-day-split { color: #DBD6CD; }
  .menu-day.rest .menu-day-bar { background: transparent; border: 1px dashed #DBD6CD; height: 0; }

  .menu-splits {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 24px;
    margin-bottom: 28px;
  }
  .menu-card {
    background: #FCFBFA;
    border: 1px solid #DBD6CD;
    border-radius: 4px;
    overflow: hidden;
  }
  .menu-card-head {
    padding: 22px 22px 18px;
    border-bottom: 1px solid #DBD6CD;
    background: #F8F7F4;
    position: relative;
  }
  .menu-card-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .menu-card-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #7A756C;
    margin-bottom: 4px;
  }
  .menu-card-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    letter-spacing: 0.08em;
    font-weight: 500;
    color: #2A2520;
  }
  .menu-card-cn {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    color: #7A756C;
    margin-left: 10px;
    font-weight: 400;
  }
  .menu-card-freq {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: #2A2520;
    padding: 4px 10px;
    border: 1px solid #DBD6CD;
    border-radius: 12px;
    background: #FCFBFA;
  }

  .menu-card-body { padding: 4px 0; }
  .menu-ex {
    display: grid;
    grid-template-columns: 24px minmax(0, 1fr);
    gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid #E8E4DB;
    align-items: flex-start;
  }
  .menu-ex:last-child { border-bottom: none; }
  .menu-ex-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: #7A756C;
    padding-top: 7px;
  }
  .menu-ex-main {
    min-width: 0;
  }
  .menu-ex-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 3px;
  }
  .menu-ex-cn {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    color: #2A2520;
    font-weight: 400;
    line-height: 1.4;
    flex: 1 1 0;
    min-width: 0;
    overflow-wrap: anywhere;
  }
  .menu-ex-en {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #7A756C;
    line-height: 1.4;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .menu-ex-scheme {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
    white-space: nowrap;
    padding: 4px 8px;
    background: #F8F7F4;
    border: 1px solid #E8E4DB;
    border-radius: 2px;
    transition: all 0.2s ease;
  }
  .menu-ex-scheme:hover { border-color: #7A756C; background: #FCFBFA; }
  .menu-ex-scheme:focus-within { border-color: #2A2520; background: #FCFBFA; }
  .menu-ex-scheme input.menu-scheme-sets,
  .menu-ex-scheme input.menu-scheme-reps {
    font-family: 'JetBrains Mono', monospace;
    font-variant-numeric: tabular-nums;
    font-size: 12px;
    color: #2A2520;
    background: transparent;
    border: none;
    outline: none;
    padding: 0;
    margin: 0;
    text-align: center;
    letter-spacing: 0;
    border-radius: 0;
    box-shadow: none;
    height: auto;
    min-height: 0;
  }
  .menu-ex-scheme input.menu-scheme-sets { width: 20px; }
  .menu-ex-scheme input.menu-scheme-reps { width: 46px; }
  .menu-ex-scheme input.menu-scheme-sets::-webkit-inner-spin-button,
  .menu-ex-scheme input.menu-scheme-sets::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .menu-scheme-x {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #7A756C;
  }
  .menu-ex-note {
    grid-column: 2 / -1;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    color: #C0392B;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .menu-aux {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 24px;
  }

  /* ADD BLOCK BUTTONS */
  .add-block-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 12px 10px;
    border: 1px dashed #DBD6CD;
    background: transparent;
    color: #7A756C;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s ease;
    text-align: center;
  }
  .add-block-btn:hover {
    border-style: solid;
    border-color: #2A2520;
    color: #2A2520;
    background: #FCFBFA;
  }

  .ex-row { display: flex; align-items: flex-start; gap: 10px; padding: 12px 0; border-bottom: 1px solid #E8E4DB; }
  .ex-row:last-child { border-bottom: none; }
  .ex-check {
    width: 14px; height: 14px;
    border: 1px solid #DBD6CD; border-radius: 2px;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: transparent; margin-top: 3px;
    transition: all 0.2s ease;
    position: relative;
  }
  .ex-check:hover { border-color: #2A2520; }
  .ex-check.checked { background: #2A2520; border-color: #2A2520; }
  .ex-check.checked::after {
    content: '';
    width: 7px; height: 4px;
    border-left: 1.5px solid #FCFBFA;
    border-bottom: 1.5px solid #FCFBFA;
    transform: rotate(-45deg) translate(0, -1px);
  }
  .ex-row.skipped .ex-name { text-decoration: line-through; color: #7A756C; }
  .ex-row.skipped .ex-check { pointer-events: none; border-style: dashed; }

  .inset-panel {
    background: #F8F7F4;
    border-top: 1px solid #DBD6CD;
    border-bottom: 1px solid #DBD6CD;
    border-radius: 2px;
    padding: 4px 16px;
  }

  input[type="number"], input[type="text"] {
    font-family: 'JetBrains Mono', monospace;
    font-variant-numeric: tabular-nums;
    background: #FCFBFA;
    border: 1px solid #DBD6CD;
    color: #2A2520;
    padding: 5px 8px;
    border-radius: 2px;
    text-align: center;
    font-size: 12px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s ease;
  }
  input[type="number"]:focus, input[type="text"]:focus { border-color: #2A2520; }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    padding: 6px 12px;
    border: 1px solid #DBD6CD;
    background: transparent; color: #2A2520;
    cursor: pointer; border-radius: 2px;
    transition: all 0.2s ease;
  }
  .btn:hover { background: #2A2520; color: #FCFBFA; border-color: #2A2520; }
  .btn-ghost { border-color: transparent; color: #7A756C; padding: 4px 8px; }
  .btn-ghost:hover { background: transparent; color: #2A2520; border-color: transparent; }

  .nav-btn {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid #DBD6CD; border-radius: 2px;
    background: transparent; color: #2A2520;
    font-family: 'JetBrains Mono', monospace; font-size: 14px;
    cursor: pointer; transition: all 0.2s ease;
  }
  .nav-btn:hover { background: #2A2520; color: #FCFBFA; border-color: #2A2520; }

  /* CONFIG EDITOR */
  .editor-section { margin-bottom: 28px; }
  .editor-section-title { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.2em; color: #7A756C; margin-bottom: 12px; text-transform: uppercase; }
  .editor-pattern-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 4px; }
  .editor-day-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.1em; color: #7A756C; text-align: center; margin-bottom: 4px; text-transform: uppercase; }
  .editor-day-select { font-family: 'JetBrains Mono', monospace; font-size: 10px; background: #FCFBFA; border: 1px solid #DBD6CD; color: #2A2520; padding: 6px 2px; border-radius: 2px; width: 100%; text-align: center; cursor: pointer; outline: none; appearance: none; -webkit-appearance: none; text-align-last: center; }
  .editor-day-select:focus { border-color: #2A2520; }
  .editor-split-card { border: 1px solid #DBD6CD; border-radius: 4px; margin-bottom: 12px; overflow: hidden; }
  .editor-split-head { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #FCFBFA; border-bottom: 1px solid #E8E4DB; }
  .editor-color-swatch { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
  .editor-split-name-input { font-family: 'Noto Sans TC', sans-serif; font-size: 13px; background: transparent; border: none; border-bottom: 1px solid #DBD6CD; color: #2A2520; padding: 1px 4px; outline: none; width: 120px; flex-shrink: 0; }
  .editor-split-name-input:focus { border-bottom-color: #2A2520; }
  .editor-split-en-input { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.08em; background: transparent; border: none; border-bottom: 1px solid #DBD6CD; color: #2A2520; padding: 1px 4px; outline: none; width: 80px; flex-shrink: 0; }
  .editor-split-en-input:focus { border-bottom-color: #2A2520; }
  .editor-split-type-badge { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.12em; color: #7A756C; padding: 2px 6px; border: 1px solid #DBD6CD; border-radius: 2px; text-transform: uppercase; cursor: pointer; flex-shrink: 0; }
  .editor-split-type-badge:hover { border-color: #2A2520; color: #2A2520; }
  .editor-del-split { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #C0392B; background: transparent; border: none; cursor: pointer; padding: 2px 4px; flex-shrink: 0; }
  .editor-del-split:hover { text-decoration: underline; }
  .editor-ex-list { padding: 8px 0; }
  .editor-ex-row { display: flex; align-items: center; gap: 8px; padding: 6px 14px; border-bottom: 1px solid #F0EDE8; }
  .editor-ex-row:last-child { border-bottom: none; }
  .editor-ex-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #7A756C; flex-shrink: 0; width: 18px; }
  .editor-ex-fields { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .editor-ex-row-top { display: flex; align-items: baseline; gap: 8px; }
  .editor-ex-row-bot { display: flex; align-items: baseline; gap: 8px; }
  .editor-ex-input, .editor-ex-en-input, .editor-ex-scheme-input {
    background: transparent; border: none; border-bottom: 1px solid transparent; outline: none; padding: 2px 4px; width: auto;
  }
  .editor-ex-input { font-family: 'Noto Sans TC', sans-serif; font-size: 13px; color: #2A2520; flex: 1; min-width: 60px; }
  .editor-ex-en-input { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #7A756C; flex: 1; min-width: 60px; }

async function sbFetch(path, opts = {}) {
  const headers = {
    'apikey': SB_KEY,
    'Authorization': `Bearer ${SB_KEY}`,
    'Content-Type': 'application/json',
    ...(opts.headers || {}),
  };
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, { ...opts, headers });
  if (!res.ok) throw new Error(`SB ${res.status}: ${await res.text()}`);
  if (res.status === 204) return null;
  const text = await res.text();

}

function parseScheme(str) {
  const m = String(str || '').match(/(\d+)\s*[×xX]\s*(.+)/);
  if (m) return { sets: parseInt(m[1]), reps: m[2].trim() };
  return { sets: 3, reps: '10' };
}

function defaultMenuState() {
  const result = {};
  for (const [key, split] of Object.entries(state.config.splits)) {
    result[key] = split.exercises.map(ex => parseScheme(ex.scheme));
  }
  return result;
}

async function loadMenu() {
  const reconcile = (stored) => {
    const defaults = defaultMenuState();
    for (const key of Object.keys(defaults)) {
      if (!Array.isArray(stored[key])) stored[key] = defaults[key];
      else {
        while (stored[key].length < defaults[key].length)
          stored[key].push(defaults[key][stored[key].length]);
        stored[key].length = defaults[key].length;
      }
    }
    return stored;
  };
  try {
    const rows = await sbFetch('settings?key=eq.menu&select=value');
    if (rows?.[0]?.value) {
      state.menu = reconcile(rows[0].value);
      try { localStorage.setItem(MENU_STORAGE_KEY, JSON.stringify(state.menu)); } catch {}
      return;
    }
  } catch (e) { console.warn('SB loadMenu:', e.message); }
  try {

    if (raw) { state.menu = reconcile(JSON.parse(raw)); return; }
  } catch {}
  state.menu = defaultMenuState();

}

function pad2(n) { return String(n).padStart(2, '0'); }

function ymd(d) {
  return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
}
function parseYmd(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function genId() {
  return 'b' + Math.random().toString(36).slice(2, 9);
}

function blockMinutes(b) {
  if (!b.start || !b.end) return 0;
  const [sh, sm] = b.start.split(':').map(Number);
  const [eh, em] = b.end.split(':').map(Number);
  let mins = (eh * 60 + em) - (sh * 60 + sm);
  if (mins < 0) mins += 24 * 60;
  return mins;
}
function fmtDuration(mins) {
  if (!mins || mins < 0) return '0:00';
  return `${Math.floor(mins / 60)}:${pad2(mins % 60)}`;
}

function newBlock(type) {
  const now = new Date();
  const roundedMin = Math.floor(now.getMinutes() / 30) * 30;
  const startDt = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours(), roundedMin);
  const endDt = new Date(startDt.getTime() + 90 * 60 * 1000);
  const start = `${pad2(startDt.getHours())}:${pad2(startDt.getMinutes())}`;
  const end   = `${pad2(endDt.getHours())}:${pad2(endDt.getMinutes())}`;
  const base = { id: genId(), type, start, end, collapsed: false, note: '' };
  if (type === 'lift') return { ...base, splits: [], sets: {} };
  if (type === 'volleyball') return { ...base };
  return base;
}

function blockHasData(b) {
  if (!b) return false;
  if (b.start || b.end) return true;
  if (b.type === 'lift') {
    if (b.splits?.length) return true;
    if (b.sets && Object.values(b.sets).some(s => s?.length)) return true;
  }
  if (b.note?.trim()) return true;
  return false;
}

function dayHasData(d) {
  return !!(d && d.blocks && d.blocks.some(blockHasData));
}

function sortBlocks(blocks) {
  return blocks.sort((a, b) => {
    if (!a.start && !b.start) return 0;
    if (!a.start) return 1;
    if (!b.start) return -1;
    return a.start.localeCompare(b.start);
  });
}

function findBlock(day, id) {
  return day.blocks?.find(b => b.id === id);
}

function migrateFromV1(logs) {
  const result = {};
  for (const [date, old] of Object.entries(logs || {})) {
    const block = {
      id: genId(),
      type: 'lift',
      start: '', end: '',
      collapsed: false,
      splits: old.splits || [],
      sets: old.sets || {},
      note: old.note || '',
    };
    if (blockHasData(block)) result[date] = { blocks: [block] };
  }
  return result;
}

async function load() {
  let sbRows = null;
  try {
    sbRows = await sbFetch('logs?select=date,blocks');
  } catch (e) { console.warn('SB load logs:', e.message); }

  if (sbRows && sbRows.length > 0) {
    // Supabase 有資料 → 用雲端版本
    state.logs = {};
    for (const r of sbRows) state.logs[r.date] = { blocks: r.blocks || [] };
  } else {
    // Supabase 空 → 從 localStorage 載入並 migrate
    try {
      const v2 = localStorage.getItem(STORAGE_KEY_V2);
      if (v2) state.logs = JSON.parse(v2) || {};
      else {
        const v1 = localStorage.getItem(STORAGE_KEY_V1);
        state.logs = v1 ? migrateFromV1(JSON.parse(v1)) : {};
      }
    } catch { state.logs = {}; }

    // 把本地資料推上雲端（首次部署會發生）
    if (sbRows !== null && Object.keys(state.logs).length > 0) {
      const rows = Object.entries(state.logs)
        .filter(([_, d]) => d?.blocks?.length)
        .map(([date, d]) => ({ date, blocks: d.blocks }));
      if (rows.length) {
        try {
          await sbUpsert('logs', rows);
          console.log(`Migrated ${rows.length} days to Supabase`);
        } catch (e) { console.warn('Migration failed:', e.message); }
      }
    }
  }
  try { localStorage.setItem(STORAGE_KEY_V2, JSON.stringify(state.logs)); } catch {}
}

function cleanEmpty() {
  for (const k in state.logs) {
    const day = state.logs[k];
    if (!day || !Array.isArray(day.blocks)) { delete state.logs[k]; continue; }
    day.blocks = day.blocks.filter(blockHasData);
    if (day.blocks.length === 0) delete state.logs[k];
  }
}

let _sbDirty = new Set();
let _sbTimer = null;

async function _sbFlush() {
  const dates = [..._sbDirty];
  _sbDirty.clear();
  for (const date of dates) {
    const day = state.logs[date];
    try {
      if (!day || !day.blocks?.length) {
        await sbFetch(`logs?date=eq.${date}`, { method: 'DELETE' });
      } else {
        await sbUpsert('logs', { date, blocks: day.blocks, updated_at: new Date().toISOString() });
      }
    } catch (e) {
      console.warn(`SB save ${date}:`, e.message);
      _sbDirty.add(date); // retry next flush
    }
  }
}

function save() {
  // 假設改動發生在 state.selected（所有 sidebar 事件都針對選中日）
  _sbDirty.add(state.selected);
  cleanEmpty();
  try { localStorage.setItem(STORAGE_KEY_V2, JSON.stringify(state.logs)); } catch {}
  clearTimeout(_sbTimer);
  _sbTimer = setTimeout(_sbFlush, 1200);
}

function ensureDay(date) {
  if (!state.logs[date]) state.logs[date] = { blocks: [] };
  if (!state.logs[date].blocks) state.logs[date].blocks = [];
  return state.logs[date];
}
function readDay(date) {
  return state.logs[date] || { blocks: [] };
}

const MONTH_NAMES = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];

function renderCalendar() {
  const grid = document.getElementById('calendar-grid');
  const y = state.view.getFullYear();
  const m = state.view.getMonth();

  document.getElementById('month-label').textContent = `${y}.${String(m + 1).padStart(2, '0')}`;
  document.getElementById('month-title-full').textContent = `${y} / ${MONTH_NAMES[m]}`;

  const first = new Date(y, m, 1);
  const firstWd = (first.getDay() + 6) % 7; // Mon=0
  const daysInMonth = new Date(y, m + 1, 0).getDate();

  const cells = [];
  for (let i = firstWd - 1; i >= 0; i--) {
    cells.push({ date: new Date(y, m, -i), other: true });
  }
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ date: new Date(y, m, d), other: false });
  }
  while (cells.length < 42) {
    const last = cells[cells.length - 1].date;
    cells.push({
      date: new Date(last.getFullYear(), last.getMonth(), last.getDate() + 1),
      other: true,
    });
  }

  const todayStr = ymd(new Date());
  grid.innerHTML = cells.map(c => {
    const dStr = ymd(c.date);
    const day = state.logs[dStr];
    const isToday = dStr === todayStr;
    const isSelected = dStr === state.selected;

    const markers = collectCellMarkers(day);
    const blocks = day?.blocks || [];
    const totalMin = blocks.reduce((a, b) => a + blockMinutes(b), 0);
    const blockCount = blocks.length;

    let foot = '';
    if (blockCount) {
      foot = totalMin > 0
        ? `${blockCount}BLK · ${fmtDuration(totalMin)}`
        : `${blockCount}BLK`;
    }

    const markerHtml = markers.map(m => `<span class="marker ${m}"></span>`).join('');

    return `
      <div class="cal-cell ${c.other ? 'other-month' : ''} ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''}" data-date="${dStr}">
        <div class="flex items-start justify-between gap-1">
          <span class="day-num">${c.date.getDate()}</span>
          <div class="flex gap-1 flex-wrap justify-end">${markerHtml}</div>
        </div>
        <div style="position: absolute; left: 12px; right: 12px; bottom: 8px;">
          ${foot ? `<div class="label-micro" style="font-size: 9px;">${foot}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  grid.querySelectorAll('.cal-cell').forEach(el => {
    el.addEventListener('click', () => {
      const d = parseYmd(el.dataset.date);
      state.selected = el.dataset.date;
      if (d.getMonth() !== state.view.getMonth() || d.getFullYear() !== state.view.getFullYear()) {
        state.view = new Date(d.getFullYear(), d.getMonth(), 1);
      }
      renderAll();
    });
  });

  updateStats();
}

function collectCellMarkers(day) {
  if (!day || !day.blocks) return [];
  const seen = new Set();
  const markers = [];
  const order = [...state.config.splitOrder, 'vb'];
  for (const b of day.blocks) {
    if (b.type === 'lift') {
      for (const s of b.splits || []) {
        if (!seen.has(s)) { seen.add(s); markers.push(s); }
      }
    } else if (b.type === 'volleyball') {
      if (!seen.has('vb')) { seen.add('vb'); markers.push('vb'); }
    }
  }
  markers.sort((a, b) => order.indexOf(a) - order.indexOf(b));
  return markers;
}

function updateStats() {
  const y = state.view.getFullYear();
  const m = state.view.getMonth();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  let count = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    if (dayHasData(state.logs[ymd(new Date(y, m, d))])) count++;
  }
  document.getElementById('month-count').textContent = String(count).padStart(2, '0');
  document.getElementById('streak-count').textContent = String(computeStreak()).padStart(2, '0');
}

function computeStreak() {
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 400; i++) {
    const d = new Date(today.getFullYear(), today.getMonth(), today.getDate() - i);
    const day = state.logs[ymd(d)];
    if (dayHasData(day)) {
      streak++;
    } else {
      if (i === 0) continue;
      break;
    }
  }
  return streak;
}

function computeDayTotals(day) {
  const blocks = day.blocks || [];
  let activeMin = 0, vbMin = 0;
  let mainSets = 0, prepSets = 0, volume = 0;
  for (const b of blocks) {
    const mins = blockMinutes(b);
    activeMin += mins;
    if (b.type === 'volleyball') vbMin += mins;
    if (b.type === 'lift') {
      for (const [id, sets] of Object.entries(b.sets || {})) {
        if (getPrepIds().has(id)) prepSets += sets.length;
        else {
          mainSets += sets.length;
          for (const s of sets) volume += (s.weight || 0) * (s.reps || 0);
        }
      }
    }
  }
  return { blockCount: blocks.length, activeMin, vbMin, mainSets, prepSets, volume };
}

function bindSidebarEvents(dStr, host) {
  const getBlock = (id) => findBlock(ensureDay(dStr), id);

  host.querySelectorAll('[data-add-block]').forEach(btn => {
    btn.addEventListener('click', () => {
      const day = ensureDay(dStr);
      day.blocks.push(newBlock(btn.dataset.addBlock));
      sortBlocks(day.blocks);
      save(); renderAll();
    });
  });

  host.querySelectorAll('[data-del-block]').forEach(btn => {
    btn.addEventListener('click', () => {
      const day = ensureDay(dStr);
      const id = btn.dataset.delBlock;
      day.blocks = day.blocks.filter(b => b.id !== id);
      save(); renderAll();
    });
  });

  host.querySelectorAll('[data-toggle-collapse]').forEach(btn => {
    btn.addEventListener('click', () => {
      const b = getBlock(btn.dataset.toggleCollapse);
      if (!b) return;
      b.collapsed = !b.collapsed;
      save(); renderAll();
    });
  });

  host.querySelectorAll('[data-time-input]').forEach(inp => {
    inp.addEventListener('change', () => {
      const [id, field] = inp.dataset.timeInput.split('|');
      const b = getBlock(id);
      if (!b) return;
      b[field] = inp.value;
      sortBlocks(ensureDay(dStr).blocks);
      save(); renderAll();
    });
  });

  host.querySelectorAll('[data-block-note]').forEach(inp => {
    inp.addEventListener('input', () => {
      const b = getBlock(inp.dataset.blockNote);
      if (!b) return;
      b.note = inp.value;
      save();
    });
  });

  host.querySelectorAll('[data-lift-split]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [id, key] = btn.dataset.liftSplit.split('|');
      const b = getBlock(id);
      if (!b) return;
      b.splits = b.splits || [];
      const i = b.splits.indexOf(key);
      if (i >= 0) b.splits.splice(i, 1);
      else b.splits.push(key);
      save(); renderAll();
    });
  });

  host.querySelectorAll('[data-lift-toggle]').forEach(el => {
    el.addEventListener('click', () => {
      const [id, exId] = el.dataset.liftToggle.split('|');
      const b = getBlock(id);
      if (!b) return;
      b.sets = b.sets || {};
      if (!b.sets[exId] || b.sets[exId].length === 0) {
        b.sets[exId] = [{ weight: 0, reps: 0 }];
      } else {
        delete b.sets[exId];
      }
      save(); renderAll();
    });
  });

  host.querySelectorAll('[data-add-set]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [id, exId] = btn.dataset.addSet.split('|');
      const b = getBlock(id);
      if (!b) return;
      b.sets = b.sets || {};
      b.sets[exId] = b.sets[exId] || [];
      const last = b.sets[exId][b.sets[exId].length - 1] || { weight: 0, reps: 0 };
      b.sets[exId].push({ weight: last.weight, reps: last.reps });
      save(); renderAll();
    });
  });

  host.querySelectorAll('[data-remove-set]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [id, exId, idx] = btn.dataset.removeSet.split('|');
      const b = getBlock(id);
      if (!b) return;
      b.sets[exId].splice(Number(idx), 1);
      if (!b.sets[exId].length) delete b.sets[exId];
      save(); renderAll();
    });
  });

  host.querySelectorAll('[data-set-input]').forEach(inp => {
    inp.addEventListener('input', () => {
      const [id, exId, idx, field] = inp.dataset.setInput.split('|');
      const b = getBlock(id);
      if (!b) return;
      b.sets[exId][Number(idx)][field] = Number(inp.value) || 0;
      save();
      renderCalendar();
    });
  });

  const clearBtn = document.getElementById('clear-day');
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      delete state.logs[dStr];
      save(); renderAll();
    });
  }
}

      <div class="grid gap-2 label-micro" style="grid-template-columns: 24px 1fr 1fr 28px; padding-bottom:6px;">
        <span>#</span><span>KG</span><span>REPS</span><span></span>

      <div class="menu-day">
        <div class="menu-day-wd">${d.wd}</div>
        <div class="menu-day-split">VB</div>
        <div class="menu-day-bar marker vb"></div>
      </div>`;
    const s = cfg.splits[d.split];
    if (!s) return '';
    return `
      <div class="menu-day">
        <div class="menu-day-wd">${d.wd}</div>
        <div class="menu-day-split">${s.en}</div>
        <div class="menu-day-bar ${d.split}"></div>
      </div>`;
  }).join('');

  const schemeEditHtml = (group, i) => {
    const s = state.menu?.[group]?.[i] || { sets: 3, reps: '10' };
    return `
      <div class="menu-ex-scheme">
        <input type="number" class="menu-scheme-sets" value="${s.sets}" min="1" max="20" data-menu-field="${group}|${i}|sets">
        <span class="menu-scheme-x">×</span>
        <input type="text" class="menu-scheme-reps" value="${s.reps}" maxlength="8" data-menu-field="${group}|${i}|reps">
      </div>`;
  };

  const splitCardHtml = (key, s) => `
    <div class="menu-card">
      <div class="menu-card-head">
        <div class="menu-card-bar ${key}"></div>
        <div class="flex items-start justify-between mb-2">
          <div>
            <div class="menu-card-label">${s.type === 'prep' ? 'ACTIVATION' : s.type === 'aux' ? 'STABILITY' : 'SPLIT'}</div>
            <div>
              <span class="menu-card-title">${s.en}</span>
              <span class="menu-card-cn">${s.cn}</span>
            </div>
          </div>
          <div class="menu-card-freq">${s.freq || s.hint || ''}</div>
        </div>
      </div>
      <div class="menu-card-body">
        ${s.exercises.map((ex, i) => `
          <div class="menu-ex">
            <div class="menu-ex-num">${pad2(i+1)}</div>
            <div class="menu-ex-main">
              <div class="menu-ex-top">
                <div class="menu-ex-cn"><button class="ex-name-btn" data-ex-info="${ex.id}">${ex.cn}</button>${ex.skip ? ' <span class="label-micro" style="color:#C0392B;">SKIP</span>' : ''}</div>
                ${schemeEditHtml(key, i)}
              </div>
              <div class="menu-ex-en">${ex.en}${ex.note ? ' · ' + ex.note : ''}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;

  // derive meta from config
  const mainSplits = cfg.splitOrder.filter(k => cfg.splits[k]?.type === 'main');
  const hasVb = cfg.weekPattern.some(d => d.split === 'vb');
  const schemeVal = [...mainSplits.map(k => cfg.splits[k].en), ...(hasVb ? ['VB'] : [])].join(' / ');
  const sessions = cfg.weekPattern.filter(d => d.split !== 'rest').length;
  const rest = cfg.weekPattern.filter(d => d.split === 'rest').length;
  const metaItems = [
    { label: 'SCHEME',   value: schemeVal },
    { label: 'SESSIONS', value: `${sessions} / WEEK` },
    { label: 'REST',     value: `${rest} / WEEK` },
  ];

  host.innerHTML = `
    <div class="menu-wrap">
      <div class="menu-head">
        <div class="flex items-start justify-between">
          <div>
            <div class="label-micro mb-1">${cfg.meta.title}</div>
            <div class="title-page">週課表 · Weekly Menu</div>
            <div class="menu-subtitle">${cfg.meta.subtitle}</div>
          </div>
          <div class="flex gap-2">
            <button class="btn btn-ghost" id="menu-edit-btn">EDIT</button>
            <button class="btn btn-ghost" id="menu-reset">RESET INTENSITY</button>
          </div>
        </div>
        <div class="menu-meta">
          ${metaItems.map(m => `
            <div class="menu-meta-item">
              <div class="menu-meta-label">${m.label}</div>
              <div class="menu-meta-value">${m.value}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="menu-pattern">${patternHtml}</div>

      <div class="menu-splits">
        ${cfg.splitOrder.map(key => splitCardHtml(key, cfg.splits[key])).join('')}
      </div>
    </div>
  `;

  host.querySelectorAll('[data-menu-field]').forEach(inp => {
    inp.addEventListener('input', () => {
      const [group, idx, field] = inp.dataset.menuField.split('|');
      updateMenuField(group, Number(idx), field, inp.value);
    });
  });
  document.getElementById('menu-reset')?.addEventListener('click', () => {
    if (confirm('將所有組數 / 次數恢復為預設值？')) resetMenu();
  });
  document.getElementById('menu-edit-btn')?.addEventListener('click', () => {
    state.edit_mode = true; renderMenu();
  });
}

// ============================================================
// CONFIG EDITOR
// ============================================================
function renderEditor(host) {
  const cfg = state.config;

  const splitOptions = (selected) => {
    const opts = [
      `<option value="rest" ${selected === 'rest' ? 'selected' : ''}>REST</option>`,
      `<option value="vb"   ${selected === 'vb'   ? 'selected' : ''}>VB</option>`,
      ...cfg.splitOrder.map(k =>
        `<option value="${k}" ${selected === k ? 'selected' : ''}>${cfg.splits[k].en}</option>`
      ),
    ];
    return opts.join('');
  };

  const patternHtml = `
    <div class="editor-section">
      <div class="editor-section-title">Weekly Pattern</div>
      <div class="editor-pattern-grid">
        ${cfg.weekPattern.map((d, i) => `
          <div>
            <div class="editor-day-label">${d.wd}</div>
            <select class="editor-day-select" data-pattern-idx="${i}">${splitOptions(d.split)}</select>
          </div>
        `).join('')}
      </div>
    </div>`;

  const exRowHtml = (key, ex, ei) => `
    <div class="editor-ex-row" data-split="${key}" data-ex-idx="${ei}">
      <div class="editor-ex-num">${pad2(ei+1)}</div>
      <div class="editor-ex-fields">
        <div class="editor-ex-row-top">
          <input class="editor-ex-input" type="text" value="${ex.cn}" placeholder="中文名" data-ex-field="${key}|${ei}|cn">
          <input class="editor-ex-scheme-input" type="text" value="${ex.scheme || ''}" placeholder="3×10" data-ex-field="${key}|${ei}|scheme">
        </div>
        <div class="editor-ex-row-bot">
          <input class="editor-ex-en-input" type="text" value="${ex.en}" placeholder="English name" data-ex-field="${key}|${ei}|en">
        </div>
      </div>
      <button class="editor-skip-toggle ${ex.skip ? 'on' : ''}" data-ex-skip="${key}|${ei}">${ex.skip ? 'SKIP' : 'skip'}</button>
      <button class="editor-del-ex" data-del-ex="${key}|${ei}">×</button>
    </div>`;

  const splitCardHtml = (key) => {
    const s = cfg.splits[key];
    return `
      <div class="editor-split-card" data-split-key="${key}">
        <div class="editor-split-head">
          <div class="editor-color-swatch" style="background:${s.color};" data-color-swatch="${key}" title="點擊改色"></div>
          <input type="color" class="color-picker-input" id="color-picker-${key}" value="${s.color}" data-color-for="${key}">
          <input class="editor-split-en-input" type="text" value="${s.en}" placeholder="EN" data-split-field="${key}|en">
          <input class="editor-split-name-input" type="text" value="${s.cn}" placeholder="中文名" data-split-field="${key}|cn">
          <button class="editor-split-type-badge" data-split-type="${key}">${s.type}</button>
          <button class="editor-del-split" data-del-split="${key}">REMOVE</button>
        </div>
        <div class="editor-ex-list">
          ${s.exercises.map((ex, ei) => exRowHtml(key, ex, ei)).join('')}
          <button class="editor-add-ex" data-add-ex="${key}">+ ADD EXERCISE</button>
        </div>
      </div>`;
  };

  host.innerHTML = `
    <div class="menu-wrap">
      <div class="menu-head">
        <div class="flex items-start justify-between">
          <div>
            <div class="label-micro mb-1">CONFIG_EDITOR</div>
            <div class="title-page">編輯模式 · Edit Config</div>
          </div>
          <div class="flex gap-2">
            <button class="btn btn-ghost" id="editor-reset-all">RESET ALL DEFAULTS</button>
            <button class="btn" id="editor-done">DONE</button>
          </div>
        </div>
      </div>

      ${patternHtml}

      <div class="editor-section">
        <div class="editor-section-title">Splits & Exercises</div>
        ${cfg.splitOrder.map(splitCardHtml).join('')}
        <button class="editor-add-split" id="editor-add-split">+ ADD SPLIT</button>
      </div>
    </div>
  `;

  // ---- editor events ----

  // done
  host.querySelector('#editor-done').addEventListener('click', () => {
    state.edit_mode = false; renderMenu();
  });

  // reset all
  host.querySelector('#editor-reset-all').addEventListener('click', () => {
    if (confirm('將菜單完全重設為預設值？（不影響訓練日誌）')) resetConfig();
  });

  // weekly pattern
  host.querySelectorAll('[data-pattern-idx]').forEach(sel => {
    sel.addEventListener('change', () => {
      cfg.weekPattern[Number(sel.dataset.patternIdx)].split = sel.value;
      saveConfig(); renderMenu();
    });
  });

  // split name / en
  host.querySelectorAll('[data-split-field]').forEach(inp => {
    inp.addEventListener('input', () => {
      const [key, field] = inp.dataset.splitField.split('|');
      cfg.splits[key][field] = inp.value;
      saveConfig();
    });
  });

  // split color swatch → open color picker
  host.querySelectorAll('[data-color-swatch]').forEach(swatch => {
    swatch.addEventListener('click', () => {
      document.getElementById(`color-picker-${swatch.dataset.colorSwatch}`)?.click();
    });
  });
  host.querySelectorAll('[data-color-for]').forEach(picker => {
    picker.addEventListener('input', () => {
      const key = picker.dataset.colorFor;
      cfg.splits[key].color = picker.value;
      host.querySelector(`[data-color-swatch="${key}"]`).style.background = picker.value;
      saveConfig(); injectSplitStyles();
    });
  });

  // split type cycle
  host.querySelectorAll('[data-split-type]').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.splitType;
      const types = ['main', 'aux', 'prep'];
      const cur = types.indexOf(cfg.splits[key].type);
      cfg.splits[key].type = types[(cur + 1) % types.length];
      saveConfig(); renderMenu();
    });
  });

  // delete split
  host.querySelectorAll('[data-del-split]').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.delSplit;
      if (cfg.splitOrder.length <= 1) return;
      if (!confirm(`刪除 ${cfg.splits[key].en}？`)) return;
      delete cfg.splits[key];
      cfg.splitOrder = cfg.splitOrder.filter(k => k !== key);
      // remove from weekPattern
      cfg.weekPattern.forEach(d => { if (d.split === key) d.split = 'rest'; });
      saveConfig(); injectSplitStyles(); state.menu = defaultMenuState(); saveMenu(); renderMenu();
    });
  });

  // exercise fields
  host.querySelectorAll('[data-ex-field]').forEach(inp => {
    inp.addEventListener('input', () => {
      const [key, idx, field] = inp.dataset.exField.split('|');
      cfg.splits[key].exercises[Number(idx)][field] = inp.value;
      saveConfig();
      if (field === 'scheme') { state.menu = defaultMenuState(); saveMenu(); }
    });
  });

  // skip toggle
  host.querySelectorAll('[data-ex-skip]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [key, idx] = btn.dataset.exSkip.split('|');
      const ex = cfg.splits[key].exercises[Number(idx)];
      ex.skip = !ex.skip;
      saveConfig(); renderMenu();
    });
  });

  // delete exercise
  host.querySelectorAll('[data-del-ex]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [key, idx] = btn.dataset.delEx.split('|');
      cfg.splits[key].exercises.splice(Number(idx), 1);
      saveConfig(); state.menu = defaultMenuState(); saveMenu(); renderMenu();
    });
  });

  // add exercise
  host.querySelectorAll('[data-add-ex]').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.addEx;
      const id = 'ex_' + Math.random().toString(36).slice(2, 8);
      cfg.splits[key].exercises.push({ id, cn: '新動作', en: 'New Exercise', scheme: '3 × 10' });
      saveConfig(); state.menu = defaultMenuState(); saveMenu(); renderMenu();
    });
  });

  // add split
  host.querySelector('#editor-add-split').addEventListener('click', () => {
    const key = 'split_' + Math.random().toString(36).slice(2, 7);
    cfg.splits[key] = { cn: '新分組', en: 'NEW', color: '#7A756C', type: 'main', freq: '×2 / WEEK', exercises: [] };
    cfg.splitOrder.push(key);
    saveConfig(); injectSplitStyles(); state.menu = defaultMenuState(); saveMenu(); renderMenu();
  });
}

function setView(mode) {
  state.view_mode = mode;
  const sidebar = document.getElementById('sidebar');
  const calView = document.getElementById('view-calendar');
  const menuView = document.getElementById('view-menu');
  const isCal = mode === 'calendar';

  sidebar.classList.toggle('hidden', !isCal);
  calView.classList.toggle('hidden', !isCal);
  menuView.classList.toggle('hidden', isCal);

  document.querySelectorAll('.view-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.view === mode);
  });

  if (!isCal) renderMenu();
  else renderAll();
}

document.getElementById('prev-month').addEventListener('click', () => {
  state.view = new Date(state.view.getFullYear(), state.view.getMonth() - 1, 1);
  renderCalendar();
});
document.getElementById('next-month').addEventListener('click', () => {
  state.view = new Date(state.view.getFullYear(), state.view.getMonth() + 1, 1);
  renderCalendar();
});
document.getElementById('today-btn').addEventListener('click', () => {
  const now = new Date();
  state.view = new Date(now.getFullYear(), now.getMonth(), 1);
  state.selected = ymd(now);
  renderAll();
});

document.addEventListener('keydown', (e) => {
  if (e.target.matches('input, textarea')) return;
  const d = parseYmd(state.selected);
  let next;
  if (e.key === 'ArrowLeft')  next = new Date(d.getFullYear(), d.getMonth(), d.getDate() - 1);
  else if (e.key === 'ArrowRight') next = new Date(d.getFullYear(), d.getMonth(), d.getDate() + 1);
  else if (e.key === 'ArrowUp')    next = new Date(d.getFullYear(), d.getMonth(), d.getDate() - 7);
  else if (e.key === 'ArrowDown')  next = new Date(d.getFullYear(), d.getMonth(), d.getDate() + 7);
  else return;
  e.preventDefault();
  state.selected = ymd(next);
  if (next.getMonth() !== state.view.getMonth() || next.getFullYear() !== state.view.getFullYear()) {
    state.view = new Date(next.getFullYear(), next.getMonth(), 1);
  }
  renderAll();
});

document.querySelectorAll('.view-tab').forEach(tab => {
  tab.addEventListener('click', () => setView(tab.dataset.view));
});

// === EXERCISE INFO MODAL ===
function openExerciseModal(id) {
  const lib = state.library?.[id];
  // fallback：library 沒這筆 → 從現有 config exercises 撈基本資料
  let cn = '', en = id, instructions_cn = [], instructions_en = [], image_urls = [], primary_muscles = [], equipment = '', level = '', category = '';
  if (lib) {
    cn = lib.name_cn || ''; en = lib.name_en || id;
    instructions_cn = lib.instructions_cn || [];
    instructions_en = lib.instructions_en || [];
    image_urls = lib.image_urls || [];
    primary_muscles = lib.primary_muscles || [];
    equipment = lib.equipment || ''; level = lib.level || ''; category = lib.category || '';
  } else if (state.config) {
    for (const s of Object.values(state.config.splits || {})) {
      const ex = (s.exercises || []).find(e => e.id === id);
      if (ex) { cn = ex.cn || ''; en = ex.en || id; break; }
    }
  }
  const showCn = cn || en;
  const showEn = en;
  const useCnInst = instructions_cn.length > 0;
  const inst = useCnInst ? instructions_cn : instructions_en;

  const tags = [];
  if (level)     tags.push(`<span class="modal-meta-tag primary">${level.toUpperCase()}</span>`);
  if (category)  tags.push(`<span class="modal-meta-tag">${category.toUpperCase()}</span>`);
  if (equipment) tags.push(`<span class="modal-meta-tag">${equipment.toUpperCase()}</span>`);
  for (const m of primary_muscles) tags.push(`<span class="modal-meta-tag">${m.toUpperCase()}</span>`);

  const imgs = image_urls.length
    ? `<div class="modal-images ${image_urls.length === 1 ? 'single' : ''}">${image_urls.map(u => `<img src="${u}" alt="" loading="lazy" onerror="this.style.opacity=0.2;">`).join('')}</div>`
    : '';

  const instBlock = inst.length
    ? `<div class="modal-section-label">${useCnInst ? 'INSTRUCTIONS' : 'INSTRUCTIONS · EN'}</div>
       <ol class="modal-instructions">${inst.map(s => `<li>${s.replace(/</g,'&lt;')}</li>`).join('')}</ol>`
    : `<div class="modal-empty">尚無動作說明 — library 載入後將自動補上</div>`;

  document.getElementById('exercise-modal-content').innerHTML = `
    <div class="modal-head">
      <div>
        <div class="modal-head-cn">${showCn}</div>
        <div class="modal-head-en">${showEn}</div>
      </div>
      <button class="modal-close" id="exercise-modal-close" aria-label="關閉">×</button>
    </div>
    <div class="modal-body">
      ${imgs}
      ${tags.length ? `<div class="modal-meta">${tags.join('')}</div>` : ''}
      ${instBlock}
    </div>
  `;
  document.getElementById('exercise-modal').classList.add('open');
}

function closeExerciseModal() {
  document.getElementById('exercise-modal').classList.remove('open');
}

// 全域代理：點到任何 [data-ex-info] 就開 modal
document.addEventListener('click', (e) => {
  const trigger = e.target.closest('[data-ex-info]');
  if (trigger) { e.preventDefault(); openExerciseModal(trigger.dataset.exInfo); return; }
  if (e.target.id === 'exercise-modal' || e.target.id === 'exercise-modal-close') closeExerciseModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeExerciseModal();
});

(async () => {
  await loadConfig();
  await loadMenu();
  injectSplitStyles();
  await load();
  loadLibrary();   // 不 await — library 是漸進增強，慢點到不影響首屏
  renderAll();
  // 離開頁面時強制 flush 待寫資料
  window.addEventListener('beforeunload', () => { if (_sbTimer) { clearTimeout(_sbTimer); _sbFlush(); } });
})();
</script>
